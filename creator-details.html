<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --neon-blue: #00f3ff;
            --cyber-purple: #bc13fe;
            --matrix-green: #00ff41;
            --dark-bg: #0a0a0f;
            --card-bg: rgba(15, 15, 25, 0.9);
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --gradient-1: linear-gradient(135deg, var(--neon-blue), var(--cyber-purple));
            --gradient-2: linear-gradient(45deg, var(--matrix-green), var(--neon-blue));
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar {
            width: 8px;
            background: var(--dark-bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gradient-1);
            border-radius: 4px;
        }

        header {
            background: radial-gradient(circle at 50% 50%, 
                rgba(11, 11, 25, 0.9) 0%,
                rgba(11, 11, 25, 0.7) 50%,
                rgba(11, 11, 25, 0.4) 100%);
            padding: 80px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
            border-bottom: 2px solid var(--neon-blue);
            animation: pulse-border 2s infinite;
        }

        @keyframes pulse-border {
            0%, 100% { border-color: rgba(0, 243, 255, 0.3); }
            50% { border-color: rgba(0, 243, 255, 0.8); }
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><path fill="%2300f3ff" fill-opacity="0.2" d="M49,-50.7C62.3,-42.2,70.2,-21.1,71.9,1.7C73.6,24.5,69.1,49,55.7,60.3C42.3,71.6,20.1,69.8,-3.1,72.9C-26.3,76,-52.6,84.1,-64.9,76.2C-77.1,68.3,-75.3,44.5,-72.8,23.5C-70.3,2.5,-67.1,-15.7,-58.9,-30.3C-50.7,-44.9,-37.5,-55.9,-22.3,-63.5C-7.1,-71.1,10.1,-75.3,24.1,-71.2C38.1,-67.1,48.9,-54.7,49,-50.7Z" transform="translate(100 100)"/></svg>');
            animation: hologram 20s linear infinite;
            opacity: 0.3;
        }

        @keyframes hologram {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        header h1 {
            font-size: 3.5rem;
            font-weight: 700;
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue), 0 0 30px var(--neon-blue);
            animation: glitch 1.5s linear infinite alternate;
            margin-bottom: 1rem;
            position: relative;
            z-index: 1;
        }

        @keyframes glitch {
            0%, 100% { text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue), 0 0 30px var(--neon-blue); }
            50% { text-shadow: 0 0 5px var(--cyber-purple), 2px 2px 15px var(--matrix-green); }
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            height: 52px;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 243, 255, 0.1);
            z-index: 1000;
            padding: 0.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 1rem;
        }

        .nav-links a {
            color: var(--text-primary);
            text-decoration: none;
            position: relative;
            padding: 0.2rem 0;
            transition: all 0.3s ease;
            font-weight: 600;
            text-shadow: 0 0 5px rgba(0, 243, 255, 0.2);
            font-size: 0.9rem;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--gradient-1);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-links a:hover {
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .hamburger {
            display: none;
            font-size: 1.5rem;
            background: none;
            border: none;
            color: var(--neon-blue);
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 1002;
            padding: 0.3rem;
        }

        .hamburger:hover {
            color: var(--matrix-green);
            transform: rotate(90deg);
        }

        .auth-buttons button {
            background: var(--gradient-1);
            color: var(--dark-bg);
            padding: 0.4rem 1.2rem;
            border: 2px solid var(--neon-blue);
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            font-size: 0.8rem;
        }

        .auth-buttons button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(0, 243, 255, 0.2);
            transition: all 0.3s ease;
        }

        .auth-buttons button:hover::before {
            left: 0;
        }

        .auth-buttons button:hover {
            background: var(--gradient-2);
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--neon-blue);
        }

        .mobile-menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(5px);
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease;
        }

        .mobile-menu-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background: var(--card-bg);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            border-left: 4px solid var(--neon-blue);
            position: relative;
        }

        .container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: var(--gradient-1);
            border-radius: 12px 12px 0 0;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .container:hover::after {
            opacity: 1;
        }

        h2 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--neon-blue);
            margin-bottom: 20px;
            position: relative;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }

        h2::after {
            content: '';
            width: 60px;
            height: 3px;
            background: var(--gradient-1);
            position: absolute;
            bottom: -10px;
            left: 0;
            border-radius: 2px;
        }

        .student-details {
            line-height: 1.8;
        }

        .student-details p {
            font-size: 0.95rem;
            margin: 10px 0;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .student-details p strong {
            color: var(--text-primary);
            font-weight: 600;
        }

        .student-details a {
            color: var(--neon-blue);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            text-shadow: 0 0 5px rgba(0, 243, 255, 0.3);
        }

        .student-details a:hover {
            color: var(--matrix-green);
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
        }

        .no-data {
            color: var(--text-secondary);
            font-style: italic;
            font-size: 1.1rem;
            text-shadow: 0 0 5px rgba(0, 243, 255, 0.2);
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 20px;
            padding: 12px 25px;
            background: var(--gradient-1);
            color: var(--dark-bg);
            text-decoration: none;
            border: 2px solid var(--neon-blue);
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }

        .back-button:hover {
            background: var(--gradient-2);
            transform: translateX(5px);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
        }

        footer {
            background: linear-gradient(135deg, rgba(10, 10, 15, 0.95), rgba(20, 20, 30, 0.95));
            color: var(--text-primary);
            padding: 40px 20px;
            text-align: center;
            border-top: 1px solid rgba(0, 243, 255, 0.1);
            position: relative;
        }

        footer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-1);
        }

        footer p {
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
            text-shadow: 0 0 5px rgba(0, 243, 255, 0.2);
        }

        .scroll-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: var(--gradient-1);
            color: var(--dark-bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
            border: none;
        }

        .scroll-to-top.visible {
            opacity: 1;
            visibility: visible;
        }

        .scroll-to-top:hover {
            background: var(--gradient-2);
            transform: translateY(-3px);
        }

        @media (max-width: 768px) {
            header { padding: 60px 20px; }
            header h1 { font-size: 2.2rem; line-height: 1.2; }
            nav { padding: 0.5rem 1rem; height: 52px; }
            .hamburger { display: block; }
            .nav-links {
                position: fixed;
                top: 0;
                right: -100%;
                width: 80%;
                max-width: 300px;
                height: 100vh;
                background: linear-gradient(135deg, rgba(15, 15, 25, 0.95), rgba(25, 25, 35, 0.95));
                flex-direction: column;
                padding: 4rem 1rem;
                transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
                z-index: 1001;
                box-shadow: -5px 0 15px rgba(0, 243, 255, 0.1);
                border-left: 1px solid var(--neon-blue);
            }
            .nav-links.active { right: 0; }
            .nav-links a { font-size: 1.3rem; padding: 0.8rem 1rem; width: 100%; border-bottom: 1px solid rgba(0, 243, 255, 0.1); }
            .desktop-auth { display: none; }
            .mobile-auth { display: flex; flex-direction: column; gap: 1rem; margin-top: 1.5rem; padding: 0 1rem; }
            .mobile-auth button { width: 100%; padding: 0.8rem; font-size: 1rem; }
            .logo { font-size: 1.3rem; }
            .container { max-width: 90%; margin: 30px auto; padding: 20px; }
            h2 { font-size: 1.5rem; margin-bottom: 15px; }
            .student-details p { font-size: 0.9rem; margin: 8px 0; }
            .no-data { font-size: 1rem; }
            .back-button { padding: 10px 20px; font-size: 0.9rem; }
            footer { padding: 25px 15px; font-size: 0.9rem; }
            .scroll-to-top { width: 40px; height: 40px; font-size: 1.2rem; bottom: 20px; right: 20px; }
        }

        @media (max-width: 480px) {
            header h1 { font-size: 1.8rem; }
            .container { padding: 15px; }
            h2 { font-size: 1.3rem; margin-bottom: 12px; }
            .student-details p { font-size: 0.85rem; margin: 6px 0; }
            .no-data { font-size: 0.9rem; }
            .back-button { padding: 8px 15px; font-size: 0.85rem; }
            footer { padding: 20px 10px; font-size: 0.8rem; }
        }

        @media (min-width: 769px) {
            .mobile-auth { display: none; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Student Details</h1>
    </header>

    <nav>
        <div class="logo gradient-text">Taskora</div>
        <button class="hamburger" aria-label="Toggle Menu"><i class="fas fa-bars"></i></button>
        <div class="nav-links" id="navLinks">
            <a href="main.html">Home</a>
            <a href="available-projects.html">Available Projects</a>
            <a href="available-talent.html">Available Talent</a>
            <a href="community.html">Community Forum</a>
          
            <div id="dynamicNav"></div>
            <div class="auth-buttons mobile-auth" id="mobileAuth">
                <button class="login-btn">Login</button>
                <button class="signup-btn">Sign Up</button>
            </div>
        </div>
        <div class="auth-buttons desktop-auth" id="desktopAuth">
            <button class="login-btn">Login</button>
            <button class="signup-btn">Sign Up</button>
        </div>
        <div class="mobile-menu-overlay" id="mobileOverlay"></div>
    </nav>

    <div class="container">
        <h2>Student Profile</h2>
        <div class="student-details" id="studentDetails">
            <p>Loading student details...</p>
        </div>
        <a href="available-talent.html" class="back-button">Back to Talent</a>
    </div>

    <div class="scroll-to-top" id="scrollToTop">
        <i class="fas fa-arrow-up"></i>
    </div>

    <footer>
        <p>© 2025 Taskora. All Rights Reserved.</p>
    </footer>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
        import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
        import { getDatabase, ref, get } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';
        import { getAnalytics } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js';

        const firebaseConfig = {
            apiKey: "AIzaSyD0wtET8bTtw_133RE4rWZiRFGESfbDtC0",
            authDomain: "student-startup-connect.firebaseapp.com",
            databaseURL: "https://student-startup-connect-default-rtdb.firebaseio.com",
            projectId: "student-startup-connect",
            storageBucket: "student-startup-connect.firebasestorage.app",
            messagingSenderId: "570854385529",
            appId: "1:570854385529:web:e45e5076a0cbcb9a56f1a8",
            measurementId: "G-T5PMGL8K26"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);
        const analytics = getAnalytics(app);

        document.addEventListener('DOMContentLoaded', () => {
            const hamburger = document.querySelector('.hamburger');
            const navLinks = document.querySelector('#navLinks');
            const mobileOverlay = document.querySelector('#mobileOverlay');
            const desktopAuth = document.getElementById('desktopAuth');
            const mobileAuth = document.getElementById('mobileAuth');
            const scrollToTopBtn = document.getElementById('scrollToTop');

            const toggleMenu = () => {
                const isOpen = navLinks.classList.toggle('active');
                mobileOverlay.classList.toggle('active', isOpen);
                hamburger.innerHTML = isOpen ? '<i class="fas fa-times"></i>' : '<i class="fas fa-bars"></i>';
                document.body.style.overflow = isOpen ? 'hidden' : '';
            };

            hamburger.addEventListener('click', toggleMenu);
            mobileOverlay.addEventListener('click', toggleMenu);

            document.querySelectorAll('.nav-links a').forEach(item => {
                item.addEventListener('click', () => {
                    if (window.innerWidth <= 768) {
                        navLinks.classList.remove('active');
                        mobileOverlay.classList.remove('active');
                        document.body.style.overflow = '';
                    }
                });
            });

            window.addEventListener('scroll', () => {
                if (window.pageYOffset > 300) {
                    scrollToTopBtn.classList.add('visible');
                } else {
                    scrollToTopBtn.classList.remove('visible');
                }
            });

            scrollToTopBtn.addEventListener('click', () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });

            // Authentication state listener
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    const profileButtonHTML = `<button class="profile-btn">Profile</button>`;
                    desktopAuth.innerHTML = profileButtonHTML;
                    mobileAuth.innerHTML = profileButtonHTML;

                    document.querySelectorAll('.profile-btn').forEach(btn => {
                        btn.addEventListener('click', () => {
                            window.location.href = 'profile.html';
                        });
                    });
                } else {
                    const authButtonsHTML = `
                        <button class="login-btn">Login</button>
                        <button class="signup-btn">Sign Up</button>
                    `;
                    desktopAuth.innerHTML = authButtonsHTML;
                    mobileAuth.innerHTML = authButtonsHTML;

                    document.querySelectorAll('.login-btn').forEach(btn => {
                        btn.addEventListener('click', () => {
                            window.location.href = 'login.html';
                        });
                    });
                    document.querySelectorAll('.signup-btn').forEach(btn => {
                        btn.addEventListener('click', () => {
                            window.location.href = 'signup.html';
                        });
                    });
                }
            });

            // Fetch student details
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('userId');

            if (!userId) {
                document.getElementById('studentDetails').innerHTML = '<p class="no-data">No student ID provided.</p>';
                return;
            }

            const studentRef = ref(database, `students/${userId}`);
            get(studentRef).then((snapshot) => {
                const studentDetails = document.getElementById('studentDetails');
                if (!snapshot.exists()) {
                    studentDetails.innerHTML = '<p class="no-data">Student not found.</p>';
                    return;
                }

                const student = snapshot.val();
                studentDetails.innerHTML = `
                    <p><i class="fas fa-user"></i> <strong>Name:</strong> ${student.fullName || 'N/A'}</p>
                    <p><i class="fas fa-envelope"></i> <strong>Email:</strong> ${student.email || 'N/A'}</p>
                    <p><i class="fas fa-code"></i> <strong>Skills:</strong> ${student.skills || 'N/A'}</p>
                    <p><i class="fas fa-briefcase"></i> <strong>Experience:</strong> ${student.experience || 'N/A'}</p>
                    <p><i class="fas fa-graduation-cap"></i> <strong>Education:</strong> ${student.education || 'N/A'}</p>
                    <p><i class="fas fa-file-alt"></i> <strong>Resume:</strong> ${
                        student.resumeLink ? `<a href="${student.resumeLink}" target="_blank">View</a>` : 'N/A'
                    }</p>
                    <p><i class="fab fa-github"></i> <strong>GitHub:</strong> ${
                        student.githubLink ? `<a href="${student.githubLink}" target="_blank">Profile</a>` : 'N/A'
                    }</p>
                    <p><i class="fab fa-linkedin"></i> <strong>LinkedIn:</strong> ${
                        student.linkedinLink ? `<a href="${student.linkedinLink}" target="_blank">Profile</a>` : 'N/A'
                    }</p>
                    <p><i class="fas fa-info-circle"></i> <strong>Bio:</strong> ${student.bio || 'N/A'}</p>
                    <p><i class="fas fa-project-diagram"></i> <strong>Project Types:</strong> ${student.preferredProjects || 'N/A'}</p>
                    <p><i class="fas fa-check-circle"></i> <strong>Confirmed:</strong> ${student.confirmed ? 'Yes' : 'No'}</p>
                    <p><i class="fas fa-clock"></i> <strong>Joined:</strong> ${
                        student.timestamp ? new Date(student.timestamp).toLocaleString() : 'N/A'
                    }</p>
                `;
            }).catch((error) => {
                console.error('Error fetching student details:', error);
                document.getElementById('studentDetails').innerHTML = '<p class="no-data">Error loading student details: ' + error.message + '</p>';
            });
        });
    </script>
</body>
</html>
